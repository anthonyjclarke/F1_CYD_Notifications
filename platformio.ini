; F1 CYD Notifications
; ESP32-2432S028R (2.8" Cheap Yellow Display)

[env:cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/cu.usbserial-240
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.4.0
    https://github.com/tzapu/WiFiManager.git
    https://github.com/witnessmenow/Universal-Arduino-Telegram-Bot.git
    esp32async/ESPAsyncWebServer@^3.6.2
    esp32async/AsyncTCP@^3.3.3
    ayushsharma82/ElegantOTA@^3.1.6
    ropg/ezTime@^0.8.3

build_flags =
    ; TFT_eSPI configuration for CYD ESP32-2432S028R
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; ElegantOTA async mode
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1

monitor_filters = esp32_exception_decoder
